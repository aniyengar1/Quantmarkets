name: Run Collector

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas supabase

      - name: Check secrets are loaded
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then echo "ERROR: SUPABASE_URL is empty"; else echo "SUPABASE_URL is set"; fi
          if [ -z "$SUPABASE_KEY" ]; then echo "ERROR: SUPABASE_KEY is empty"; else echo "SUPABASE_KEY is set"; fi

      - name: Run collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python collector.py

      - name: Ping Streamlit app (keepalive)
        run: curl -s -o /dev/null -w "%{http_code}" https://getcallibr.streamlit.app || true
